<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Catalogue Viewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 280px;
      min-width: 280px;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 24px 20px 16px;
      border-bottom: 1px solid #2d2d4e;
    }

    #sidebar-header h1 {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
    }

    #sidebar-header p {
      font-size: 12px;
      color: #8888aa;
      margin-top: 4px;
    }

    #search-box {
      margin: 12px 16px;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #2d2d4e;
      background: #252540;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
      width: calc(100% - 32px);
    }

    #search-box::placeholder { color: #666; }
    #search-box:focus { border-color: #4f8ef7; }

    #product-list {
      overflow-y: auto;
      flex: 1;
      padding: 8px 0 16px;
    }

    .product-item {
      padding: 10px 20px;
      cursor: pointer;
      font-size: 13px;
      border-left: 3px solid transparent;
      transition: all 0.15s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .product-item:hover { background: #252540; color: #fff; }

    .product-item.active {
      background: #1e3a6e;
      border-left-color: #4f8ef7;
      color: #fff;
      font-weight: 600;
    }

    .product-item .badge {
      background: #2d2d4e;
      color: #8888aa;
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 10px;
    }

    .product-item.active .badge { background: #4f8ef7; color: #fff; }

    /* ── Main content ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #topbar {
      background: #fff;
      padding: 20px 28px;
      border-bottom: 1px solid #e8eaf0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    #topbar-left h2 {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a2e;
    }

    #topbar-left p {
      font-size: 13px;
      color: #666;
      margin-top: 4px;
      max-width: 600px;
      line-height: 1.5;
    }

    #filter-bar {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    #col-search {
      padding: 7px 12px;
      border: 1px solid #dde0e8;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
      width: 200px;
    }

    #col-search:focus { border-color: #4f8ef7; }

    #stats {
      font-size: 12px;
      color: #999;
      white-space: nowrap;
    }

    /* ── Table area ── */
    #table-container {
      flex: 1;
      overflow: auto;
      padding: 20px 28px;
    }

    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #aaa;
      gap: 12px;
    }

    #empty-state svg { opacity: 0.3; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      font-size: 13px;
    }

    thead tr {
      background: #f7f8fc;
      border-bottom: 2px solid #e8eaf0;
    }

    th {
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      font-size: 12px;
      color: #666;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    td {
      padding: 11px 16px;
      border-bottom: 1px solid #f0f2f5;
      color: #333;
    }

    tbody tr:last-child td { border-bottom: none; }

    tbody tr:hover td { background: #f7f9ff; }

    .item-number {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      color: #4f8ef7;
      font-weight: 500;
    }

    .material-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
    }

    .material-Gl, .material-G { background: #e8f4e8; color: #2d7a2d; }
    .material-SS, .material-SS\ A4 { background: #e8eef8; color: #2d4a8a; }

    .highlight { background: #fff3cd; border-radius: 3px; padding: 0 2px; }

    /* ── No results ── */
    .no-results {
      text-align: center;
      padding: 48px;
      color: #aaa;
      font-size: 14px;
    }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #aaa; }
  </style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <div id="sidebar-header">
    <h1>Product Catalogue</h1>
    <p id="total-products">Loading...</p>
  </div>
  <input type="text" id="search-box" placeholder="Search products..." oninput="filterSidebar()" />
  <div id="product-list"></div>
</div>

<!-- Main -->
<div id="main">
  <div id="topbar">
    <div id="topbar-left">
      <h2 id="product-title">Select a product</h2>
      <p id="product-desc"></p>
    </div>
    <div id="filter-bar">
      <input type="text" id="col-search" placeholder="Filter items..." oninput="renderTable()" />
      <span id="stats"></span>
    </div>
  </div>
  <div id="table-container">
    <div id="empty-state">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
      </svg>
      <p>Select a product from the sidebar</p>
    </div>
  </div>
</div>

<script>
  let catalogue = {};
  let activeProduct = null;

  // Load data
  fetch('gpt_catalogue_progress.json')
    .then(r => r.json())
    .then(data => {
      catalogue = data.catalogue || data;
      initSidebar();
    })
    .catch(() => {
      document.getElementById('empty-state').innerHTML =
        '<p style="color:#e55">Could not load gpt_catalogue_progress.json.<br>Make sure it\'s in the same folder as this HTML file.</p>';
    });

  function initSidebar() {
    const names = Object.keys(catalogue);
    document.getElementById('total-products').textContent = `${names.length} products`;
    renderSidebar(names);
  }

  function renderSidebar(names) {
    const list = document.getElementById('product-list');
    list.innerHTML = names.map(name => {
      const count = catalogue[name]?.items?.length ?? 0;
      return `<div class="product-item ${name === activeProduct ? 'active' : ''}"
                   onclick="selectProduct('${escHtml(name)}')">
                <span>${escHtml(name)}</span>
                <span class="badge">${count}</span>
              </div>`;
    }).join('');
  }

  function filterSidebar() {
    const q = document.getElementById('search-box').value.toLowerCase();
    const filtered = Object.keys(catalogue).filter(n => n.toLowerCase().includes(q));
    renderSidebar(filtered);
  }

  function selectProduct(name) {
    activeProduct = name;
    renderSidebar(
      Object.keys(catalogue).filter(n =>
        n.toLowerCase().includes(document.getElementById('search-box').value.toLowerCase())
      )
    );
    document.getElementById('product-title').textContent = name;
    const desc = catalogue[name]?.description || '';
    document.getElementById('product-desc').textContent = desc;
    document.getElementById('col-search').value = '';
    renderTable();
  }

  function renderTable() {
    const container = document.getElementById('table-container');
    if (!activeProduct) return;

    const items = catalogue[activeProduct]?.items ?? [];
    const q = document.getElementById('col-search').value.toLowerCase();

    const filtered = q
      ? items.filter(item => Object.values(item).some(v => String(v).toLowerCase().includes(q)))
      : items;

    document.getElementById('stats').textContent =
      `${filtered.length} of ${items.length} items`;

    if (filtered.length === 0) {
      container.innerHTML = '<div class="no-results">No items match your filter.</div>';
      return;
    }

    // Collect all column keys
    const keys = [...new Set(filtered.flatMap(item => Object.keys(item)))];

    const thead = `<thead><tr>${keys.map(k => `<th>${escHtml(k)}</th>`).join('')}</tr></thead>`;

    const tbody = filtered.map(item => {
      const cells = keys.map(k => {
        let val = item[k] ?? '';
        const valStr = String(val);

        // Highlight search term
        let display = escHtml(valStr);
        if (q && valStr.toLowerCase().includes(q)) {
          const re = new RegExp(`(${escRegex(q)})`, 'gi');
          display = display.replace(re, '<span class="highlight">$1</span>');
        }

        // Style item_number and material columns
        if (k.toLowerCase().includes('item') || k.toLowerCase().includes('number')) {
          return `<td><span class="item-number">${display}</span></td>`;
        }
        if (k.toLowerCase() === 'material') {
          const cls = 'material-' + valStr.replace(/\s+/g, '\\ ');
          return `<td><span class="material-badge ${cls}">${display}</span></td>`;
        }
        return `<td>${display}</td>`;
      }).join('');
      return `<tr>${cells}</tr>`;
    }).join('');

    container.innerHTML = `<table>${thead}<tbody>${tbody}</tbody></table>`;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function escRegex(s) {
    return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }
</script>
</body>
</html>

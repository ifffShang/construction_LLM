<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Catalogue Tool</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      max-width: 600px;
      padding: 40px 24px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: #777;
      margin-bottom: 48px;
    }

    .cards {
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      width: 240px;
      background: #fff;
      border-radius: 16px;
      padding: 36px 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: transform 0.15s, box-shadow 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      border: 2px solid transparent;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    }

    .card:active { transform: translateY(-1px); }

    .card.upload { border-color: #e8eaf0; }
    .card.upload:hover { border-color: #4f8ef7; }

    .card.catalogue { border-color: #e8eaf0; }
    .card.catalogue:hover { border-color: #6c63ff; }

    .card-icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }

    .card.upload .card-icon { background: #eef3ff; }
    .card.catalogue .card-icon { background: #f0edff; }

    .card h2 {
      font-size: 16px;
      font-weight: 600;
    }

    .card p {
      font-size: 13px;
      color: #888;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>RAG Catalogue Tool</h1>
    <p class="subtitle">Extract product data from PDF catalogues using AI</p>

    <div class="cards">
      <a href="upload.html" class="card upload">
        <div class="card-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#4f8ef7" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="12" y1="18" x2="12" y2="12"/>
            <polyline points="9 15 12 12 15 15"/>
          </svg>
        </div>
        <h2>Upload PDF</h2>
        <p>Upload a product catalogue PDF and extract data with AI</p>
      </a>

      <a href="frontend.html" class="card catalogue">
        <div class="card-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#6c63ff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M3 9h18"/>
            <path d="M9 21V9"/>
          </svg>
        </div>
        <h2>Product Catalogue</h2>
        <p>View, search and edit extracted product data</p>
      </a>
    </div>
  </div>
</body>
</html>
